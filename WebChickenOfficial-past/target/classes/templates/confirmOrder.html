<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kong Fuong Chicken</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href ="https://fonts.googleapis.com/css2" rel ="stylesheet" >
    <!-- <link rel ="stylesheet" href="style.css"> -->
    <link rel ="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <!-- <script src="dropdown.js"></script> -->
    <style>
        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    height: 100vh;
    background: #f8f9f0;
    font-family: "Poppins";
}

.Bar{
    width: 1515px;
    height: 30px;
    background: #E4002B;
}
.Post{

    width: 270px;
    height: 720px;
    background: #022135;

}
.Shopping_Cart{
    font-size: 28px;
    position:absolute;
    right: 70px;
    top: 5px;
    color: white;
}

.User_Icon{
    font-size: 28px;
    position:absolute;
    right: 10px;
    top: 5px;
    color: white;
}
.Navigation {
    color: white;
    text-align: left;
    font-size: 15px;
    padding: 20px;
    position:absolute;
    top : 150px;
}

.Navigation h2{
    margin-top: 50px;
}
.Navigation a{
    text-decoration: none;
    color: white;
}
.Navigation a:hover{
    background-color: #f8f9f0;
    color:#E4002B;
    border-radius: 10px;
    padding: 20px;
}
.Circle {
	width: 110px;
	height: 100px;
	background: #E4002B;
	-moz-border-radius: 50px;
	-webkit-border-radius: 50px;
	border-radius: 50px;
    position:absolute;
    left: 85px;
    top:0px;
}
.Kong_Fuong_Chicken img{
    width: 90px;
    height: 90px;
    position: absolute;
    left: 10px;
}
.Shopping_Cart, .User_Icon{
    cursor: pointer;
    background: unset;
    border: unset;
}
.Status {
    display: flex;
    align-items: center;
    gap: 30px;
    position: relative;
    left: 300px;
    bottom: 500px;
}

/* Cấu hình khối từng bước */
.step {
    text-align: center;
    max-width: 120px;
}

/* Đặt kích thước và căn chỉnh icon */
.step img {
    width: 50px;
    height: auto;
    margin-bottom: 10px;
}
/* Thiết kế thời gian */
.time {
    font-size: 14px;
    color: #333;
}

.Title_Box{
    position:relative;
    top: 50px;
    height: 100px;
    width: 500px;
    margin: 0px auto;
    background: #E4002B;
    border-radius: 50px;
    text-align: center;
    font-size: 30px;
}
.Title_Box a{
    position: relative;
    top: 30px;
    color:#f8f9f0

}
.Confirm{
    height: 50px;
    width: 150px;
    text-align: center;
    font-size: 25px;
    border-radius: 25px;
    background: #E4002B;
    position:absolute;
    top:650px;
    right:0px;
}
.Confirm a{
    position: relative;
    top: 10px;
    color: #f8f9f0;
}
input{
    height: 50px;
    min-width: 300px;
    background: #E4002B;
    color: white;
    font-size:16px;
}
input::placeholder {
    color: white;
    opacity: 1;
}
h1{
    position:absolute;
    left:50px;
}
.Name{
    height: 50px;
    width: 600px;
    position: relative;
    top:50px;
    display:block;
}
.Name input{
    height: 50px;
    width: 600px;
    position: relative;
    margin: 50px 100px;
}
.Phone_Number{
    height: 50px;
    width: 600px;
    position: relative;
    top:50px;
    left: 700px;
    display:block
}
.Phone_Number input{
    height: 50px;
    width: 600px;
    position: relative;
    margin: 50px 100px;
    bottom:50px;
}
.Address{
    height: 50px;
    width: 1300px;
    position: relative;
    top: 50px;
}
.Address input{
    height: 50px;
    width: 1300px;
    position: relative;
    margin: 50px 100px;
}
.Message{
    height: 50px;
    width: 600px;
    position: relative;
    top:50px;
    display:block;
}
.Message input{
    height: 50px;
    width: 600px;
    position: relative;
    margin: 50px 100px;
}
.dropdown {
    position: relative;
    display: inline-block;
    margin: 50px 100px;
    top: 100px;
}

.dropdown button {
    background-color: #E4002B;
    color: white;
    padding: 15px 0px;
    font-size: 16px;
    border: none;
    cursor: pointer;
    width: 600px; /* Cố định chiều rộng */
    text-align: left; /* Căn trái cho nội dung */
    position: relative;
}

/* Mũi tên hướng xuống mặc định */
.dropdown button::before {
    content: '▼';
    position: absolute;
    right: 10px;
    font-size: 12px;
    transition: transform 0.3s ease;
}

/* Khi mở dropdown, mũi tên sẽ hướng lên */
.dropdown button.active::before {
    content: '▲'; /* Mũi tên hướng lên */
}

.dropdown button span {
    margin-left: 0px; /* Đẩy nội dung qua bên phải để không chèn vào mũi tên */
}

.dropdown-content {
    display: none;
    position: absolute;
    background-color: #E4002B;
    width: 600px;
    z-index: 1;
}

.dropdown-content a {
    color: white;
    padding: 12px 0px;
    text-decoration: none;
    display: block;
    cursor: pointer;
}

.dropdown-content a:hover {
    background-color: #ddd;
}

    </style>
</head>
<body>
<div class="Title_Box">
    <a>Xác nhận thông tin đơn hàng</a>
</div>
<div class="Name">
    <input type="text" placeholder="Họ và tên">
</div>
<div class="Phone_Number">
    <input type="text" placeholder="Số điện thoại">
</div>
<div class="Address">
    <input type="text" placeholder="Địa chỉ">
</div>
<div class="dropdown">
    <button onclick="toggleDropdown()" id="dropdownButton"><span>Đơn vị vận chuyển</span></button>
    <div class="dropdown-content" id="dropdownMenu">
        <a onclick="selectOption('GrabFood')">GrabFood</a>
        <a onclick="selectOption('ShoppeFood')">ShoppeFood</a>
        <a onclick="selectOption('BeFood')">BeFood</a>
    </div>
</div>
<div class="Message">
    <input type="text" placeholder="Lời nhắn cho tài xế">
</div>
<div class="Confirm">
    <a href="stateOrder.html">Xác nhận</a></div>
</body>
<script>
    function toggleDropdown() {
    const dropdownMenu = document.getElementById("dropdownMenu");
    const dropdownButton = document.getElementById("dropdownButton");

    // Đổi trạng thái hiển thị của menu
    dropdownMenu.style.display = (dropdownMenu.style.display === "block") ? "none" : "block";

    // Thêm/xóa lớp 'active' để thay đổi hướng mũi tên
    dropdownButton.classList.toggle("active");
}

function selectOption(option) {
    const dropdownButton = document.getElementById("dropdownButton");
    dropdownButton.querySelector("span").textContent = option;
    document.getElementById("dropdownMenu").style.display = "none";

    // Xóa lớp 'active' để mũi tên trở về hướng xuống sau khi chọn
    dropdownButton.classList.remove("active");
}

window.onclick = function(event) {
    if (!event.target.matches('#dropdownButton') && !event.target.matches('#dropdownButton span')) {
        const dropdowns = document.getElementsByClassName("dropdown-content");
        const dropdownButton = document.getElementById("dropdownButton");

        for (let i = 0; i < dropdowns.length; i++) {
            const openDropdown = dropdowns[i];
            if (openDropdown.style.display === "block") {
                openDropdown.style.display = "none";
            }
        }

        // Xóa lớp 'active' khi click ra ngoài để mũi tên trở về hướng xuống
        dropdownButton.classList.remove("active");
    }
}
</script>
</html>
